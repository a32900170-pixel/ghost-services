<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>🔐 Админка | Призрачные услуги</title>
    <style>
        body {
            background: #0b0f18;
            color: #ddf0ff;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
        .login-box {
            background: #121e30;
            border: 2px solid #3b6290;
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            border-radius: 60px;
            text-align: center;
        }
        input {
            background: #1f3857;
            border: 1px solid #6797cf;
            color: white;
            padding: 15px;
            width: 80%;
            border-radius: 60px;
            font-size: 1.2rem;
            text-align: center;
            margin: 20px 0;
        }
        button {
            background: #30649b;
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .admin-panel {
            display: none;
            max-width: 1000px;
            margin: 20px auto;
        }
        .order-card {
            background: #142236;
            border-left: 8px solid #ffae42;
            border-radius: 30px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed #4e76a1;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .package-badge {
            background: #3b6190;
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.4rem;
        }
        .order-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 20px;
        }
        .detail-item {
            margin: 8px 0;
        }
        .detail-label {
            color: #aac9ff;
            font-weight: bold;
        }
        .delete-btn {
            background: #963e3e;
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
        }
        .clear-all {
            background: #2f4569;
            padding: 12px 30px;
            border: none;
            color: white;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1.1rem;
            margin-top: 20px;
        }
        .count {
            font-size: 1.4rem;
            color: #ffd58c;
        }
    </style>
</head>
<body>
    <div id="loginBox" class="login-box">
        <h2>🔒 Вход администратора</h2>
        <input type="password" id="passwordInput" placeholder="пароль">
        <button onclick="checkPassword()">Войти</button>
        <div id="loginError" style="color:#ffa0a0; margin-top:15px;"></div>
    </div>

    <div id="adminPanel" class="admin-panel">
        <h1>📋 Панель управления заявками</h1>
        <div id="ordersContainer"></div>
        <div class="count" id="orderCount"></div>
        <button class="clear-all" onclick="clearAllOrders()">🧹 Очистить все заявки</button>
        <br>
        <a href="index.html" style="color:#8fb3e0; display:inline-block; margin-top:20px;">← На главную</a>
    </div>

    <script>
        const PASSWORD = "22012015";

        function checkPassword() {
            if (document.getElementById('passwordInput').value === PASSWORD) {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadOrders();
            } else {
                document.getElementById('loginError').innerText = '❌ Неверный пароль';
            }
        }

        function loadOrders() {
            const orders = JSON.parse(localStorage.getItem('ghostOrders')) || [];
            const container = document.getElementById('ordersContainer');
            const countSpan = document.getElementById('orderCount');

            if (orders.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#999; padding:40px;">😴 Пока заказов нет</div>';
                countSpan.innerText = 'Всего заказов: 0';
                return;
            }

            let html = '';
            orders.sort((a,b) => b.id - a.id).forEach(order => {
                html += `
                    <div class="order-card">
                        <div class="order-header">
                            <span class="package-badge">${order.package}</span>
                            <span>🕒 ${order.timestamp}</span>
                        </div>
                        <div class="order-details">
                            <div class="detail-item"><span class="detail-label">📱 Telegram:</span> ${order.tg}</div>
                            <div class="detail-item"><span class="detail-label">📧 Email:</span> ${order.email || '—'}</div>
                            <div class="detail-item"><span class="detail-label">🚪 Кабинет:</span> ${order.room}</div>
                            <div class="detail-item"><span class="detail-label">🧑‍🏫 Учитель:</span> ${order.teacher}</div>
                            <div class="detail-item"><span class="detail-label">📚 Урок:</span> ${order.lesson}</div>
                            <div class="detail-item"><span class="detail-label">⏰ Время:</span> ${order.time}</div>
                            <div class="detail-item full-width"><span class="detail-label">💬 Коммент:</span> ${order.comments || '—'}</div>
                        </div>
                        <button class="delete-btn" onclick="deleteOrder(${order.id})">✖ Заказ выполнен</button>
                    </div>
                `;
            });
            container.innerHTML = html;
            countSpan.innerText = `Всего заказов: ${orders.length}`;
        }

        function deleteOrder(id) {
            let orders = JSON.parse(localStorage.getItem('ghostOrders')) || [];
            orders = orders.filter(o => o.id !== id);
            localStorage.setItem('ghostOrders', JSON.stringify(orders));
            loadOrders();
        }

        function clearAllOrders() {
            if (confirm('Точно очистить всё?')) {
                localStorage.removeItem('ghostOrders');
                loadOrders();
            }
        }
    </script>
</body>
</html>
