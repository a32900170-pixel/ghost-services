<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>🔐 Админка</title>
    <style>
        body {
            background: #0b0f18;
            color: #ddf0ff;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
        .login-box {
            background: #121e30;
            border: 2px solid #3b6290;
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            border-radius: 60px;
            text-align: center;
        }
        .admin-panel {
            max-width: 1200px;
            margin: 20px auto;
        }
        .section {
            background: #142236;
            border: 2px solid #3b6290;
            border-radius: 40px;
            padding: 25px;
            margin: 30px 0;
        }
        .section h2 {
            color: #ffb347;
            margin-bottom: 20px;
            border-bottom: 2px dashed #4e76a1;
            padding-bottom: 10px;
        }
        .user-card, .order-card {
            background: #1c2f48;
            border-left: 8px solid #ffae42;
            border-radius: 30px;
            padding: 20px;
            margin: 15px 0;
        }
        .user-card {
            border-left-color: #5fa7ff;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .status-select {
            background: #1f3857;
            color: white;
            border: 1px solid #6797cf;
            padding: 8px 15px;
            border-radius: 30px;
            margin-right: 10px;
        }
        .admin-comment-input {
            width: 100%;
            background: #1f3857;
            color: white;
            border: 1px solid #6797cf;
            padding: 10px 15px;
            border-radius: 30px;
            margin: 10px 0;
        }
        .save-btn, .delete-btn {
            background: #30649b;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-right: 10px;
        }
        .delete-btn {
            background: #963e3e;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #8fb3e0;
        }
    </style>
</head>
<body>
    <div id="loginBox" class="login-box">
        <h2>🔒 Вход администратора</h2>
        <input type="password" id="passwordInput" placeholder="пароль" style="width:100%; padding:15px; margin:15px 0; border-radius:60px;">
        <button onclick="checkPassword()" style="background:#30649b; color:white; padding:12px 30px; border-radius:60px; border:none; cursor:pointer;">Войти</button>
        <div id="loginError" style="color:#ffa0a0; margin-top:15px;"></div>
    </div>

    <div id="adminPanel" class="admin-panel" style="display:none;">
        <h1 style="text-align:center;">📋 Панель управления</h1>
        
        <!-- Секция пользователей -->
        <div class="section">
            <h2>👥 Зарегистрированные пользователи</h2>
            <div id="usersContainer"></div>
        </div>

        <!-- Секция заказов -->
        <div class="section">
            <h2>📦 Заказы</h2>
            <div id="ordersContainer"></div>
        </div>

        <button onclick="clearAllOrders()" style="background:#2f4569; padding:15px 30px; border-radius:40px; border:none; color:white; cursor:pointer; margin-top:20px;">🧹 Очистить все заказы</button>
        <br><a href="index.html" class="back-link">← На главную</a>
    </div>

    <script>
        const PASSWORD = "22012015";

        function checkPassword() {
            if (document.getElementById('passwordInput').value === PASSWORD) {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadUsers();
                loadOrders();
            } else {
                document.getElementById('loginError').innerText = '❌ Неверный пароль';
            }
        }

        function loadUsers() {
            const users = JSON.parse(localStorage.getItem('ghostUsers')) || [];
            const orders = JSON.parse(localStorage.getItem('ghostOrders')) || [];
            const container = document.getElementById('usersContainer');

            if (users.length === 0) {
                container.innerHTML = '<p>Пока нет пользователей</p>';
                return;
            }

            let html = '';
            users.forEach(user => {
                const userOrders = orders.filter(o => o.user === user.phone).length;
                html += `
                    <div class="user-card">
                        <div class="grid-2">
                            <div><strong>📱 Логин:</strong> ${user.phone}</div>
                            <div><strong>🔑 Пароль:</strong> ${user.password}</div>
                            <div><strong>📅 Зарегистрирован:</strong> ${user.registered}</div>
                            <div><strong>📦 Заказов:</strong> ${userOrders}</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function loadOrders() {
            const orders = JSON.parse(localStorage.getItem('ghostOrders')) || [];
            const container = document.getElementById('ordersContainer');

            if (orders.length === 0) {
                container.innerHTML = '<p>Заказов нет</p>';
                return;
            }

            let html = '';
            orders.sort((a,b) => b.id - a.id).forEach(order => {
                html += `
                    <div class="order-card" id="order-${order.id}">
                        <div class="grid-2">
                            <div><strong>👤 Клиент:</strong> ${order.user}</div>
                            <div><strong>📦 Пакет:</strong> ${order.package}</div>
                            <div><strong>📚 Урок:</strong> ${order.lesson}</div>
                            <div><strong>🚪 Каб:</strong> ${order.room}</div>
                            <div><strong>🧑‍🏫 Учитель:</strong> ${order.teacher}</div>
                            <div><strong>⏰ Время:</strong> ${order.time}</div>
                            <div><strong>💬 Коммент клиента:</strong> ${order.comments || '—'}</div>
                            <div><strong>🕒 Заказ создан:</strong> ${order.timestamp}</div>
                        </div>
                        
                        <select class="status-select" id="status-${order.id}">
                            <option ${order.status === '⏳ Принят' ? 'selected' : ''}>⏳ Принят</option>
                            <option ${order.status === '🔧 В работе' ? 'selected' : ''}>🔧 В работе</option>
                            <option ${order.status === '✅ Выполнен' ? 'selected' : ''}>✅ Выполнен</option>
                            <option ${order.status === '❌ Отменен' ? 'selected' : ''}>❌ Отменен</option>
                        </select>
                        
                        <input type="text" class="admin-comment-input" id="comment-${order.id}" 
                               placeholder="Комментарий клиенту" value="${order.adminComment || ''}">
                        
                        <button class="save-btn" onclick="updateOrder(${order.id})">💾 Сохранить</button>
                        <button class="delete-btn" onclick="deleteOrder(${order.id})">✖ Удалить заказ</button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function updateOrder(id) {
            const orders = JSON.parse(localStorage.getItem('ghostOrders')) || [];
            const index = orders.findIndex(o => o.id === id);
            if (index !== -1) {
                orders[index].status = document.getElementById(`status-${id}`).value;
                orders[index].adminComment = document.getElementById(`comment-${id}`).value;
                localStorage.setItem('ghostOrders', JSON.stringify(orders));
                alert('Сохранено');
                loadOrders();
            }
        }

        function deleteOrder(id) {
            let orders = JSON.parse(localStorage.getItem('ghostOrders')) || [];
            orders = orders.filter(o => o.id !== id);
            localStorage.setItem('ghostOrders', JSON.stringify(orders));
            loadOrders();
            loadUsers(); // обновим количество заказов у пользователей
        }

        function clearAllOrders() {
            if (confirm('Точно очистить все заказы?')) {
                localStorage.removeItem('ghostOrders');
                loadOrders();
                loadUsers();
            }
        }
    </script>
</body>
</html>
