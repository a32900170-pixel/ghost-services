<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>👤 Мои заказы</title>
    <style>
        body {
            background: #0a0d15;
            color: #e2f0fa;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            text-shadow: 0 0 15px #5fc1ff;
        }
        .order-card {
            background: #121e30;
            border-left: 8px solid #ffae42;
            border-radius: 30px;
            padding: 20px;
            margin: 20px 0;
        }
        .status {
            font-size: 1.3rem;
            font-weight: bold;
            margin: 10px 0;
        }
        .admin-comment {
            background: #1f3857;
            border-radius: 30px;
            padding: 15px;
            margin-top: 15px;
            border-left: 5px solid #ffb347;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #8fb3e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Мои заказы</h1>
        <div id="ordersList"></div>
        <a href="index.html" class="back-link">← На главную</a>
    </div>

    <script>
        function loadUserOrders() {
            const currentUser = localStorage.getItem('currentUser');
            if (!currentUser) {
                window.location.href = 'index.html';
                return;
            }

            const allOrders = JSON.parse(localStorage.getItem('ghostOrders')) || [];
            const userOrders = allOrders.filter(order => order.user === currentUser).reverse();
            
            const container = document.getElementById('ordersList');
            if (userOrders.length === 0) {
                container.innerHTML = '<p style="text-align:center;">У тебя пока нет заказов</p>';
                return;
            }

            let html = '';
            userOrders.forEach(order => {
                html += `
                    <div class="order-card">
                        <div><strong>${order.package}</strong> — ${order.timestamp}</div>
                        <div>📚 ${order.lesson}, каб. ${order.room}, учитель: ${order.teacher}</div>
                        <div>⏰ ${order.time}</div>
                        <div class="status">Статус: ${order.status}</div>
                        ${order.adminComment ? `<div class="admin-comment">📝 Комментарий: ${order.adminComment}</div>` : ''}
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        window.onload = loadUserOrders;
    </script>
</body>
</html>
