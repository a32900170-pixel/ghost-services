<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>👻 Призрачные услуги</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }
        body {
            background: #0a0d15;
            color: #e2f0fa;
            padding: 20px;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            text-shadow: 0 0 20px #5fc1ff;
        }
        .sub {
            color: #a0c0da;
            margin-bottom: 30px;
            font-style: italic;
        }
        .auth-panel {
            background: #121e30;
            border: 2px solid #3b6290;
            border-radius: 60px;
            max-width: 700px;
            margin: 20px auto;
            padding: 30px;
        }
        .auth-tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        .tab-btn {
            background: transparent;
            border: 2px solid #3b6290;
            color: #aac9ff;
            padding: 10px 30px;
            border-radius: 60px;
            font-size: 1.2rem;
            cursor: pointer;
            font-weight: bold;
        }
        .tab-btn.active {
            background: #30649b;
            color: white;
            border-color: #6bb5ff;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .auth-form input {
            background: #1f3857;
            border: 1px solid #6797cf;
            color: white;
            padding: 15px 25px;
            border-radius: 60px;
            font-size: 1.1rem;
            width: 100%;
        }
        .auth-form button {
            background: #30649b;
            border: none;
            color: white;
            padding: 15px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }
        .user-info {
            background: #1c2f48;
            border-radius: 60px;
            padding: 15px 30px;
            margin: 20px auto;
            max-width: 700px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .lk-button {
            background: #2f5375;
            color: white;
            padding: 10px 25px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: bold;
        }
        .logout-btn {
            background: #5a3c3c;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 60px;
            cursor: pointer;
        }
        .packages {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin: 40px 0;
        }
        .card {
            background: #121c2a;
            border: 2px solid #2b4260;
            border-radius: 40px;
            padding: 25px;
            width: 280px;
            transition: 0.2s;
            cursor: pointer;
        }
        .card:hover {
            border-color: #6bb5ff;
            transform: translateY(-5px);
        }
        .card.selected {
            border: 4px solid #ffb347;
            box-shadow: 0 0 25px #ffb347;
        }
        .econom h2 { color: #d4a15e; }
        .standart h2 { color: #c0d4f0; }
        .chaos h2 { color: #ff7f6e; }
        .price {
            font-size: 1.8rem;
            color: #ffdb8e;
            font-weight: bold;
            margin: 15px 0;
        }
        .order-form {
            background: #0f1824;
            border: 2px solid #3d6088;
            border-radius: 60px;
            max-width: 700px;
            margin: 30px auto;
            padding: 30px;
            text-align: left;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .full-width {
            grid-column: span 2;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #b0cef0;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            background: #1e314a;
            border: 1px solid #4d7ab5;
            color: white;
            padding: 12px 20px;
            border-radius: 60px;
            font-size: 1rem;
        }
        .btn-submit {
            background: #2b5f8a;
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 25px;
            width: 100%;
        }
        .footer {
            margin-top: 50px;
            color: #5e7e9e;
        }
        .footer a {
            color: #8fb3e0;
        }
    </style>
</head>
<body>
    <h1>👻 Школьные призрачные услуги</h1>
    <div class="sub">— сорвём урок, пока учитель пишет на доске —</div>

    <!-- Блок авторизации -->
    <div id="authPanel" class="auth-panel">
        <div class="auth-tabs">
            <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Вход</button>
            <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Регистрация</button>
        </div>
        
        <!-- Форма входа -->
        <div id="loginForm" class="auth-form">
            <input type="text" id="loginPhone" placeholder="📱 Телефон / Telegram">
            <input type="password" id="loginPassword" placeholder="🔑 Пароль">
            <button onclick="login()">🔓 Войти</button>
        </div>
        
        <!-- Форма регистрации -->
        <div id="registerForm" class="auth-form" style="display: none;">
            <input type="text" id="regPhone" placeholder="📱 Телефон / Telegram">
            <input type="password" id="regPassword" placeholder="🔑 Придумай пароль">
            <button onclick="register()">📝 Зарегистрироваться</button>
        </div>
    </div>

    <!-- Информация о пользователе -->
    <div id="userInfo" class="user-info" style="display: none;">
        <span>👤 <span id="userPhone"></span></span>
        <a href="lk.html" class="lk-button">📋 Мои заказы</a>
        <button class="logout-btn" onclick="logout()">Выйти</button>
    </div>

    <!-- Выбор пакета -->
    <div class="packages">
        <div class="card econom" onclick="selectPackage('Эконом')" id="cardЭконом">
            <h2>🥉 Эконом</h2>
            <div class="price">30₽ / печенье</div>
        </div>
        <div class="card standart" onclick="selectPackage('Стандарт')" id="cardСтандарт">
            <h2>🥈 Стандарт</h2>
            <div class="price">100₽ / шоколадка</div>
        </div>
        <div class="card chaos" onclick="selectPackage('Хаос')" id="cardХаос">
            <h2>🥇 Хаос</h2>
            <div class="price">300₽ + уважение</div>
        </div>
    </div>

    <!-- Форма заказа -->
    <div class="order-form" id="orderForm" style="display: none;">
        <h3>📋 Детали операции</h3>
        <div style="background:#1c2b41; border-radius:50px; padding:15px; margin:20px 0; text-align:center;">
            Выбран: <strong id="selectedPackageName">не выбран</strong>
        </div>
        <div class="form-grid">
            <div class="full-width">
                <label>🚪 Номер кабинета</label>
                <input type="text" id="room" placeholder="304">
            </div>
            <div class="full-width">
                <label>🧑‍🏫 Имя учителя</label>
                <input type="text" id="teacher" placeholder="Марья Ивановна">
            </div>
            <div>
                <label>📚 Урок</label>
                <input type="text" id="lesson" placeholder="Алгебра">
            </div>
            <div>
                <label>⏰ Время</label>
                <input type="text" id="time" placeholder="3 урок / 11:30">
            </div>
            <div class="full-width">
                <label>💬 Комментарий</label>
                <textarea id="comments" rows="2" placeholder="Хочется погромче..."></textarea>
            </div>
        </div>
        <button class="btn-submit" onclick="submitOrder()">👻 ОТПРАВИТЬ ЗАЯВКУ</button>
    </div>

    <div class="footer">
        <a href="admin.html">🔐 Администратору</a>
    </div>

    <script>
        let currentUser = null;
        let selectedPackage = null;

        window.onload = function() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = savedUser;
                document.getElementById('authPanel').style.display = 'none';
                document.getElementById('userInfo').style.display = 'flex';
                document.getElementById('userPhone').innerText = currentUser;
            }
        };

        function switchTab(tab) {
            if (tab === 'login') {
                document.getElementById('loginForm').style.display = 'flex';
                document.getElementById('registerForm').style.display = 'none';
                document.getElementById('loginTab').classList.add('active');
                document.getElementById('registerTab').classList.remove('active');
            } else {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'flex';
                document.getElementById('loginTab').classList.remove('active');
                document.getElementById('registerTab').classList.add('active');
            }
        }

        function register() {
            const phone = document.getElementById('regPhone').value.trim();
            const password = document.getElementById('regPassword').value.trim();

            if (!phone || !password) {
                alert('Заполни все поля');
                return;
            }

            const users = JSON.parse(localStorage.getItem('ghostUsers')) || [];
            
            if (users.find(u => u.phone === phone)) {
                alert('Такой пользователь уже есть, войди');
                return;
            }

            users.push({
                phone: phone,
                password: password,
                registered: new Date().toLocaleString()
            });
            localStorage.setItem('ghostUsers', JSON.stringify(users));

            currentUser = phone;
            localStorage.setItem('currentUser', phone);
            
            document.getElementById('authPanel').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('userPhone').innerText = phone;
        }

        function login() {
            const phone = document.getElementById('loginPhone').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const users = JSON.parse(localStorage.getItem('ghostUsers')) || [];

            const user = users.find(u => u.phone === phone && u.password === password);
            if (!user) {
                alert('Неверный логин или пароль');
                return;
            }

            currentUser = phone;
            localStorage.setItem('currentUser', phone);
            
            document.getElementById('authPanel').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('userPhone').innerText = phone;
        }

        function logout() {
            localStorage.removeItem('currentUser');
            currentUser = null;
            document.getElementById('authPanel').style.display = 'block';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('orderForm').style.display = 'none';
            selectedPackage = null;
        }

        function selectPackage(pkg) {
            if (!currentUser) {
                alert('Сначала войди!');
                return;
            }
            selectedPackage = pkg;
            document.getElementById('selectedPackageName').innerText = pkg;
            document.getElementById('orderForm').style.display = 'block';
            
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            document.getElementById('card' + pkg).classList.add('selected');
        }

        function submitOrder() {
            if (!selectedPackage || !currentUser) return;

            const room = document.getElementById('room').value.trim();
            const teacher = document.getElementById('teacher').value.trim();
            const lesson = document.getElementById('lesson').value.trim();
            const time = document.getElementById('time').value.trim();

            if (!room || !teacher || !lesson || !time) {
                alert('Заполни все поля');
                return;
            }

            const orders = JSON.parse(localStorage.getItem('ghostOrders')) || [];
            orders.push({
                id: Date.now(),
                user: currentUser,
                package: selectedPackage,
                room, teacher, lesson, time,
                comments: document.getElementById('comments').value.trim(),
                status: '⏳ Принят',
                adminComment: '',
                timestamp: new Date().toLocaleString()
            });
            localStorage.setItem('ghostOrders', JSON.stringify(orders));

            alert('Заказ отправлен!');
            
            document.getElementById('room').value = '';
            document.getElementById('teacher').value = '';
            document.getElementById('lesson').value = '';
            document.getElementById('time').value = '';
            document.getElementById('comments').value = '';
            document.getElementById('orderForm').style.display = 'none';
            selectedPackage = null;
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
        }
    </script>
</body>
</html>
